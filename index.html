  <style>

/* ===== Bannière ===== */
.banner {
    position: relative; /* Sert de repère pour du position absolute (optionnel ici) */
    text-align: center; /* Centre l’image horizontalement */
}

/* Image dans la bannière */
.banner img {
    height: auto; /* Garde les proportions naturelles */
}

/* ===== Style global de la page ===== */
body {
    font-family: Arial; /* Police du site */
    background: #0b2a6f; /* Fond bleu foncé */
    color: white; /* Texte en blanc */
    text-align: center; /* Centre le contenu */
    padding-top: 5px; /* Petit espace en haut */
}

/* ===== Titre principal ===== */
h1 {
    font-size: 32px; /* Taille du titre */
}

/* ===== Boutons ===== */
.btn {
    display: block; /* Chaque bouton prend une ligne entière */
    width: 300px; /* Largeur fixe */
    margin: 20px auto; /* Espace vertical + centrage horizontal */
    padding: 15px; /* Espace intérieur */
    background: #1e90ff; /* Couleur bleu */
    color: white; /* Texte blanc */
    text-decoration: none; /* Supprime le soulignement */
    border-radius: 10px; /* Coins arrondis */
    font-size: 18px; /* Taille du texte */
}

/* Effet au survol */
.btn:hover {
    background: #63b3ff; /* Bleu plus clair */
}

/* Bouton désactivé */
.btn.disabled {
    background: grey; /* Couleur grise */
    pointer-events: none; /* Désactive le clic */
    cursor: not-allowed; /* Curseur interdit */
}

/* ===== Footer ===== */
footer {
    margin-top: 50px; /* Espace au-dessus */
    padding: 20px; /* Espace interne */
    background: #081f4d; /* Fond bleu très foncé */
}

/* Icônes réseaux sociaux */
.social {
    margin: 10px; /* Espace entre icônes */
    color: white; /* Couleur blanche */
    font-size: 24px; /* Taille icônes */
    text-decoration: none; /* Pas de soulignement */
}

/* Effet hover sur icônes */
.social:hover {
    color: #1e90ff; /* Bleu au survol */
}

/* Texte copyright */
.copyright {
    font-size: 14px; /* Texte plus petit */
}

</style>
    
</head>
